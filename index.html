<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rice Type Detection</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, sans-serif; }

body.fade-out {
    opacity: 0;
    transform: translateX(-50px);
    transition: 0.4s;
}

.hero {
    height: 100vh;
    background: url("../static/h.jpg") no-repeat center center/cover;
    position: relative;
    color: white;
}

.hero::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

/* CENTER TEXT */
.content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 2;
}

/* BUTTON */
.btn {
    padding: 12px 25px;
    border: 2px solid #00ffcc;
    background: transparent;
    color: #00ffcc;
    cursor: pointer;
}

/* BOTTOM BAR */
.bottom-bar {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: black;
    padding: 20px 50px;
    display: flex;
    justify-content: space-between;
}

.menu a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="hero">

<div class="content">
<h1>Welcome to Rice Type Detection</h1>
<p>This model can detect rice type based on rice images.</p>

<a href="/predict" class="nav-link">
<button class="btn">Predict</button>
</a>
</div>

<div class="bottom-bar">
<div class="logo">RICE TYPE DETECTION</div>

<div class="menu"><a href="/" class="nav-link">Home</a>
<a href="/dashboard" class="nav-link">About</a>
<a href="/testimonials" class="nav-link">Testimonials</a>
<a href="/contact" class="nav-link">Contact</a>
<a href="/predict" class="nav-link">Predict</a>
</div>
</div>

</div>

<style>

body {
    opacity: 1;
    transform: translateX(0) scale(1);
    transition: all 0.5s ease;
}

body.fade-out {
    opacity: 0;
    transform: translateX(-100px) scale(0.97);
    filter: blur(6px);
}

body.fade-in {
    opacity: 0;
    transform: translateX(100px) scale(1.03);
    filter: blur(6px);
}

</style>

<script>
window.addEventListener("load", () => {
    document.body.classList.add("fade-in");

    setTimeout(() => {
        document.body.classList.remove("fade-in");
    }, 50);
});

document.querySelectorAll(".nav-link").forEach(link => {
    link.addEventListener("click", function(e) {
        e.preventDefault();
        const href = this.getAttribute("href");

        document.body.classList.add("fade-out");

        setTimeout(() => {
            window.location.href = href;
        }, 450);
    });
});

</script>

</body>
</html>
