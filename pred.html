<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rice Type Classification</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f5f5;

        opacity: 1;
        transform: translateX(0) scale(1);
        transition: all 0.5s ease;
    }

    body.fade-out {
        opacity: 0;
        transform: translateX(-100px) scale(0.97);
        filter: blur(6px);
    }

    body.fade-in {
        opacity: 0;
        transform: translateX(100px) scale(1.03);
        filter: blur(6px);
    }

    header {
        background: linear-gradient(to right, #1c1c1c, #2f3b44);
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 50px;
    }

    header h2 {
        margin: 0;
        letter-spacing: 1px;
    }

    nav a {
        color: white;
        margin-left: 20px;
        text-decoration: none;
        font-size: 14px;
    }

    nav a:last-child {
        color: #00d084;
    }

    .page-header {
        padding: 30px 60px;
        background: #fff;
    }

    .page-header h1 {
        margin: 0;
        font-size: 30px;
        color: #333;
    }

    .breadcrumb {
        float: right;
        color: #888;
        font-size: 14px;
    }

    .upload-section {
        text-align: center;
        padding: 60px 20px;
        background: #fff;
        margin: 20px 60px;
        border-radius: 10px;
    }

    .upload-section h2 {
        color: #555;
        margin-bottom: 20px;
    }

    input[type="file"] {
        margin: 10px;
    }

    button {
        padding: 6px 15px;
        border: 1px solid #ccc;
        background: #eee;
        cursor: pointer;
    }

    footer {
        background: linear-gradient(to right, #1c1c1c, #2f3b44);
        color: white;
        padding: 40px 60px;
        margin-top: 40px;
    }

    .footer-content {
        display: flex;
        justify-content: space-between;
    }

    .footer-box h3 {
        margin-bottom: 10px;
    }

    .footer-box p, .footer-box a {
        color: #ccc;
        font-size: 14px;
        text-decoration: none;
        display: block;
        margin-bottom: 5px;
    }
</style>

</head>
<body>

<header>
    <h2>RICE TYPE CLASSIFICATION</h2>

    <nav>
        <a href="/" class="nav-link">Home</a>
        <a href="/dashboard" class="nav-link">About</a>
        <a href="/testimonials" class="nav-link">Testimonials</a>
        <a href="/contact" class="nav-link">Contact</a>
        <a href="/predict" class="nav-link">Predict</a>
    </nav>
</header>

<div class="page-header">
    <span class="breadcrumb">Home / Details Page</span>
    <h1>Details Page</h1>
</div>

<div class="upload-section">
    <h2>Upload Your Image</h2>

    <form method="POST" enctype="multipart/form-data">
        <label>Choose Image:</label>
        <input type="file" name="file" required><br><br>
        <button type="submit">Upload</button>
    </form>

    {% if result %}
        <h3>Prediction: {{ result }}</h3>
        <img src="{{ image }}" width="200">
    {% endif %}
</div>

<footer>
    <div class="footer-content">
        <div class="footer-box">
            <h3>Rice</h3>
            <p>A108 Adam Street</p>
        </div>

        <div class="footer-box">
            <h3>Useful Links</h3>
            <a href="#">Home</a>
            <a href="#">About</a>
        </div>

        <div class="footer-box">
            <h3>Our Services</h3>
            <a href="#">Web Design</a>
            <a href="#">ML Model</a>
        </div>
    </div>
</footer>

<script>
window.addEventListener("load", () => {
    document.body.classList.add("fade-in");
    setTimeout(() => {
        document.body.classList.remove("fade-in");
    }, 50);
});

document.querySelectorAll(".nav-link").forEach(link => {
    link.addEventListener("click", function(e) {
        e.preventDefault();
        const href = this.getAttribute("href");

        document.body.classList.add("fade-out");

        setTimeout(() => {
            window.location.href = href;
        }, 450);
    });
});
</script>

</body>
</html>
